services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: haproxy_rooms
    restart: unless-stopped
    env_file:
      - ./services/sso/.env
    environment:
      HAPROXY_LOOPBACK_HOST: 127.0.0.1
      HAPROXY_LOOPBACK_PORT: "80"
      INTERNAL_PROXY_TOKEN: ${INTERNAL_PROXY_TOKEN}
    depends_on:
      sso-core:
        condition: service_started
      game-server-core-1:
        condition: service_started
      game-server-core-2:
        condition: service_started
      matchmaking-core:
        condition: service_started
      user-service-core:
        condition: service_started
    ports:
      - "80:80"
      - "8404:8404"
    volumes:
      - ./services/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./services/haproxy/auth_validate.lua:/usr/local/etc/haproxy/auth_validate.lua:ro
    networks:
      - rooms_network

  sso-postgres:
    image: postgres:17
    container_name: sso_postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    env_file:
      - ./services/sso/.env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10
    volumes:
      - sso_postgres_data:/var/lib/postgresql/data
    networks:
      - rooms_network

  sso-redis:
    image: redis:8-alpine
    container_name: sso_redis
    restart: unless-stopped
    env_file:
      - ./services/sso/.env
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - sso_redis_data:/data
    networks:
      - rooms_network

  sso-migrator:
    container_name: sso_migrator
    build:
      context: ./services/sso
      dockerfile: ./tools/migrator/dockerfile
    env_file:
      - ./services/sso/.env
    environment:
      POSTGRES_HOST: sso-postgres
    depends_on:
      sso-postgres:
        condition: service_healthy
    networks:
      - rooms_network

  sso-core:
    container_name: sso_core
    build:
      context: ./services/sso
      dockerfile: ./dockerfile
    restart: unless-stopped
    env_file:
      - ./services/sso/.env
    depends_on:
      sso-postgres:
        condition: service_healthy
      sso-redis:
        condition: service_started
      sso-migrator:
        condition: service_completed_successfully
    networks:
      - rooms_network

  shared-postgres:
    image: postgres:17
    container_name: rooms_shared_postgres
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
    networks:
      - rooms_network

  game-redis-1:
    image: redis:8-alpine
    container_name: game_redis_1
    restart: unless-stopped
    env_file:
      - ./services/game_server/.env
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - game_redis_1_data:/data
    networks:
      - rooms_network

  game-redis-2:
    image: redis:8-alpine
    container_name: game_redis_2
    restart: unless-stopped
    env_file:
      - ./services/game_server/.env
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - game_redis_2_data:/data
    networks:
      - rooms_network

  matchmaking-redis:
    image: redis:8-alpine
    container_name: matchmaking_redis
    restart: unless-stopped
    env_file:
      - ./services/matchmaking/.env
    volumes:
      - matchmaking_redis_data:/data
    networks:
      - rooms_network

  user-redis:
    image: redis:8-alpine
    container_name: user_redis
    restart: unless-stopped
    env_file:
      - ./services/user_service/.env
    volumes:
      - user_redis_data:/data
    networks:
      - rooms_network

  shared-migrator:
    container_name: rooms_shared_migrator
    build:
      context: .
      dockerfile: ./tools/migrator/dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: shared-postgres
    depends_on:
      shared-postgres:
        condition: service_healthy
    networks:
      - rooms_network

  game-server-core-1:
    container_name: game_server_core_1
    build:
      context: ./services/game_server
      dockerfile: ./dockerfile
    restart: unless-stopped
    env_file:
      - ./services/game_server/.env
    environment:
      REDIS_HOST: game-redis-1
      INSTANCE_ID: game-server-core-1
    depends_on:
      shared-postgres:
        condition: service_healthy
      game-redis-1:
        condition: service_started
      shared-migrator:
        condition: service_completed_successfully
    networks:
      - rooms_network

  game-server-core-2:
    container_name: game_server_core_2
    build:
      context: ./services/game_server
      dockerfile: ./dockerfile
    restart: unless-stopped
    env_file:
      - ./services/game_server/.env
    environment:
      REDIS_HOST: game-redis-2
      INSTANCE_ID: game-server-core-2
    depends_on:
      shared-postgres:
        condition: service_healthy
      game-redis-2:
        condition: service_started
      shared-migrator:
        condition: service_completed_successfully
    networks:
      - rooms_network

  matchmaking-core:
    build:
      context: ./services/matchmaking
      dockerfile: ./dockerfile
    restart: unless-stopped
    env_file:
      - ./services/matchmaking/.env
    depends_on:
      shared-postgres:
        condition: service_healthy
      matchmaking-redis:
        condition: service_started
      shared-migrator:
        condition: service_completed_successfully
    networks:
      - rooms_network

  user-service-core:
    build:
      context: ./services/user_service
      dockerfile: ./dockerfile
    restart: unless-stopped
    env_file:
      - ./services/user_service/.env
    depends_on:
      shared-postgres:
        condition: service_healthy
      user-redis:
        condition: service_started
      shared-migrator:
        condition: service_completed_successfully
    networks:
      - rooms_network

volumes:
  sso_postgres_data:
  sso_redis_data:
  shared_postgres_data:
  game_redis_1_data:
  game_redis_2_data:
  matchmaking_redis_data:
  user_redis_data:

networks:
  rooms_network:
    driver: bridge
