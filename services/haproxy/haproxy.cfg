global
    stats socket /var/run/api.sock user haproxy group haproxy mode 660 level admin expose-fd listeners
    log stdout format raw local0 info
    maxconn 4096
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

defaults
    log global
    mode http
    option httplog
    option http-server-close # чтобы websocket работал корректно
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-request 10s
    timeout tunnel 1h

# Dashboard балансировщика
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-modules

# -- Комнаты с websocket
frontend rooms_frontend
    bind :443 ssl crt /etc/haproxy/certs/domain.pem alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https

    # 1. Определение типов запросов по пути
    acl is_auth    path_beg /auth
    acl is_rooms   path_beg /rooms          # список комнат
    acl is_room_op path_beg /room           # операции с комнатами (включая WebSocket)

    # 2. JWT-валидация для всех защищённых путей (кроме /auth)
    acl is_protected req.hdr(Authorization) -m found !is_auth
    # Извлекаем Bearer-токен
    http-request set-var(txn.bearer) req.hdr(Authorization),word(2,' ') if is_protected

    # Проверка подписи (RS256, публичный ключ)
    acl valid_jwt var(txn.bearer),jwt_verify("RS256", "/etc/haproxy/jwt_pubkey.pem") -m int 1 if is_protected
    # Проверка срока действия (exp)
    acl not_expired var(txn.bearer),jwt_payload_query('$.exp') -m int gt %[date()] if is_protected
    # Проверка аудитории (aud)
    acl correct_aud var(txn.bearer),jwt_payload_query('$.aud') -m str "https://rooms.example.com" if is_protected

    http-request deny deny_status 401 content-type "text/plain" string "Invalid JWT" if is_protected !valid_jwt
    http-request deny deny_status 401 content-type "text/plain" string "Token expired" if is_protected !not_expired
    http-request deny deny_status 401 content-type "text/plain" string "Wrong audience" if is_protected !correct_aud

    # 3. Передача данных пользователя бэкенду (из JWT)
    http-request set-var(txn.user_id) var(txn.bearer),jwt_payload_query('$.sub') if is_protected
    http-request set-header X-Authenticated-User %[var(txn.user_id)] if is_protected
    # Удаляем оригинальный заголовок Authorization (не передаём токен дальше)
    http-request del-header Authorization if is_protected

    # 4. Маршрутизация
    use_backend sso_backend if is_auth
    use_backend matchmaking_backend if is_rooms

    # Для операций с комнатами (/room/*) – два варианта:
    # - Если запрос содержит параметр worker_id, используем бэкенд с балансировкой по этому параметру.
    # - Если worker_id отсутствует (например, создание комнаты), используем leastconn.
    acl has_worker_id urlp(worker_id) -m found
    use_backend workers_operation if is_room_op has_worker_id
    use_backend workers_create if is_room_op !has_worker_id

# ---------- Бэкенды ----------
# Внешний SSO (авторизация)
backend sso_backend
    server sso1 sso.example.com:443 ssl verify none

# Сервис получения списка комнат (matchmaking + БД)
backend matchmaking_backend
    server matchmaking1 10.0.1.10:8080 check
    # При необходимости масштабирования добавить ещё серверов

# Бэкенд для СОЗДАНИЯ комнат (выбор наименее загруженного воркера)
backend workers_create
    mode http
    balance leastconn
    option http-server-close
    timeout tunnel 3600s   # для WebSocket
    # Список всех воркеров (при добавлении нового – дописать сюда)
    server worker1 10.0.2.11:8080 check
    server worker2 10.0.2.12:8080 check

# Бэкенд для ОПЕРАЦИЙ с комнатами (привязка к конкретному воркеру через параметр worker_id)
backend workers_operation
    mode http
    # Балансировка по значению параметра worker_id (одинаковые worker_id → один сервер)
    balance url_param worker_id
    option http-server-close
    timeout tunnel 3600s
    # Те же самые серверы, что и в workers_create
    server worker1 10.0.2.11:8080 check
    server worker2 10.0.2.12:8080 check