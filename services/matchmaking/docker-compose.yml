services:
  core:
    container_name: LudaBox_Matchmaking
    build:
      context: .
      dockerfile: ./dockerfile
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    environment:
      - DOMAIN=${DOMAIN}
      - PUBLIC_URL=${PUBLIC_URL}
      - ALLOWED_REDIRECT_URLS=${ALLOWED_REDIRECT_URLS}
      - ALLOWED_CORS_ORIGINS=${ALLOWED_CORS_ORIGINS}
      - DEFAULT_ADMIN_EMAILS=${DEFAULT_ADMIN_EMAILS}

      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - COOKIE_PATH=${COOKIE_PATH}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - COOKIE_HTTP_ONLY=${COOKIE_HTTP_ONLY}
      - COOKIE_SAME_SITE=${COOKIE_SAME_SITE}

      - HTTP_PORT=${HTTP_PORT}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED}
      - SWAGGER_USER=${SWAGGER_USER}
      - SWAGGER_PASSWORD=${SWAGGER_PASSWORD}
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - storage_network
      - core_network

  nginx:
    container_name: LudaBox_Matchmaking_nginx
    build:
      context: ./nginx
    environment:
      - NGINX_HOST=${DOMAIN}
      - CORE_UPSTREAM=http://core:${HTTP_PORT}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      core:
        condition: service_started
    networks:
      - core_network

  certbot:
    image: certbot/certbot:latest
    container_name: LudaBox_Matchmaking_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
        
  
  postgres:
    container_name: LudaBox_Matchmaking_db
    image: postgres:17
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    # ports:
      # - "15432:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  # –Ė–ī–Ķ–ľ, –Ņ–ĺ–ļ–į –Ď–Ē –Ī—É–ī–Ķ—ā –≥–ĺ—ā–ĺ–≤–į
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 5s
      retries: 5
    networks:
      - storage_network
  
  redis:
    image: redis:8-alpine
    container_name: LudaBox_Matchmaking_redis
    # ports:
    #   - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - storage_network
volumes:
  postgres_data:
  redis_data:

networks:
  storage_network:
    driver: bridge
  core_network:
    driver: bridge
