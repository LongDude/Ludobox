basePath: /api
definitions:
  presenters.ConfigResponse:
    properties:
      archived_at:
        type: string
      boost_power:
        type: integer
      boost_price:
        type: integer
      capacity:
        type: integer
      commission:
        type: integer
      config_id:
        type: integer
      game:
        $ref: '#/definitions/presenters.GameResponse'
      game_id:
        type: integer
      is_boost:
        type: boolean
      min_users:
        type: integer
      next_round_delay:
        type: integer
      number_winners:
        type: integer
      registration_price:
        type: integer
      round_time:
        type: integer
      time:
        type: integer
      winning_distribution:
        items:
          type: integer
        type: array
    type: object
  presenters.ConfigUpsertRequest:
    properties:
      boost_power:
        type: integer
      boost_price:
        type: integer
      capacity:
        type: integer
      commission:
        type: integer
      game_id:
        type: integer
      is_boost:
        type: boolean
      min_users:
        type: integer
      next_round_delay:
        type: integer
      number_winners:
        type: integer
      registration_price:
        type: integer
      round_time:
        type: integer
      time:
        type: integer
      winning_distribution:
        items:
          type: integer
        type: array
    type: object
  presenters.ConfigsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.ConfigResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  presenters.GameHistoryItemResponse:
    properties:
      boost_fee:
        type: integer
      entry_fee:
        type: integer
      finished_at:
        type: string
      game_id:
        type: integer
      game_name:
        type: string
      joined_at:
        type: string
      net_result:
        type: integer
      participant_id:
        type: integer
      result:
        type: string
      room_id:
        type: integer
      round_id:
        type: integer
      round_status:
        type: string
      seat_number:
        type: integer
      winning_money:
        type: integer
    type: object
  presenters.GameHistoryResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.GameHistoryItemResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.GameResponse:
    properties:
      archived_at:
        type: string
      game_id:
        type: integer
      name_game:
        type: string
    type: object
  presenters.GameServerResponse:
    properties:
      archived_at:
        type: string
      instance_key:
        type: string
      last_heartbeat_at:
        type: string
      redis_host:
        type: string
      server_id:
        type: integer
      started_at:
        type: string
      status:
        type: string
    type: object
  presenters.GameServersResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.GameServerResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.GameUpsertRequest:
    properties:
      name_game:
        type: string
    type: object
  presenters.GamesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.GameResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.RoomCreateRequest:
    properties:
      config_id:
        type: integer
    type: object
  presenters.RoomResponse:
    properties:
      archived_at:
        type: string
      config:
        $ref: '#/definitions/presenters.ConfigResponse'
      config_id:
        type: integer
      current_players:
        type: integer
      room_id:
        type: integer
      server_id:
        type: integer
      server_name:
        type: string
      status:
        type: string
    type: object
  presenters.RoomUpdateRequest:
    properties:
      archived_at:
        type: string
      server_id:
        type: integer
    type: object
  presenters.RoomsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.RoomResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.UserBalanceUpdateRequest:
    properties:
      delta:
        example: -250
        type: integer
    type: object
  presenters.UserCreateRequest:
    properties:
      balance:
        example: 5000
        type: integer
      nickname:
        example: ludobox_vip
        type: string
    type: object
  presenters.UserResponse:
    properties:
      balance:
        example: 1000
        type: integer
      nickname:
        example: user_42
        type: string
      user_id:
        example: 42
        type: integer
    type: object
  presenters.UserUpdateRequest:
    properties:
      nickname:
        example: ludobox_vip_2
        type: string
    type: object
  service.AdminEvent:
    properties:
      action:
        type: string
      id:
        type: integer
      resource:
        type: string
      timestamp:
        type: string
      type:
        type: string
    type: object
  service.UserBalanceEvent:
    properties:
      action:
        type: string
      balance:
        type: integer
      timestamp:
        type: string
      type:
        type: string
      user_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: LudoBox UserService
  title: LudoBox API
  version: "1.0"
paths:
  /admin/config:
    post:
      consumes:
      - application/json
      description: Creates a new room config.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.ConfigUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Create config
      tags:
      - Config
  /admin/config/{config_id}:
    delete:
      consumes:
      - application/json
      description: Archives an active config.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Archive config
      tags:
      - Config
    get:
      consumes:
      - application/json
      description: Returns a single room config by id.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Get config by id
      tags:
      - Config
    put:
      consumes:
      - application/json
      description: Archives the existing config and creates a new config revision.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      - description: Config payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.ConfigUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Replace config by id
      tags:
      - Config
  /admin/configs/used:
    get:
      consumes:
      - application/json
      description: Returns non-archived configs with pagination, optional sorting
        and filtering.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Sort field
        in: query
        name: sort_field
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_direction
        type: string
      - collectionFormat: csv
        description: Comma-separated filter fields
        in: query
        items:
          type: string
        name: filter_fields
        type: array
      - collectionFormat: csv
        description: Comma-separated filter operators (eq, neq, gt, lt, gte, lte,
          in, not_in, contains, contained, overlap)
        in: query
        items:
          type: string
        name: filter_operators
        type: array
      - collectionFormat: csv
        description: Comma-separated filter values
        in: query
        items:
          type: string
        name: filter_values
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: List active configs
      tags:
      - Config
  /admin/events:
