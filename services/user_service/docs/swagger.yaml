        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Get game by id
      tags:
      - Game
    put:
      consumes:
      - application/json
      description: Updates an active game by id.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Game id
        in: path
        name: game_id
        required: true
        type: integer
      - description: Game payload
        in: body
