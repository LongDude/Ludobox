basePath: /api
definitions:
  presenters.ConfigResponse:
    properties:
      archived_at:
        type: string
      boost_power:
        type: integer
      boost_price:
        type: integer
      capacity:
        type: integer
      commission:
        type: integer
      config_id:
        type: integer
      game_id:
        type: integer
      is_boost:
        type: boolean
      min_users:
        type: integer
      number_winners:
        type: integer
      registration_price:
        type: integer
      time:
        type: integer
      winning_distribution:
        items:
          type: integer
        type: array
    type: object
  presenters.ConfigUpsertRequest:
    properties:
      boost_power:
        type: integer
      boost_price:
        type: integer
      capacity:
        type: integer
      commission:
        type: integer
      game_id:
        type: integer
      is_boost:
        type: boolean
      min_users:
        type: integer
      number_winners:
        type: integer
      registration_price:
        type: integer
      time:
        type: integer
      winning_distribution:
        items:
          type: integer
        type: array
    type: object
  presenters.ConfigsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.ConfigResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  presenters.RoomCreateRequest:
    properties:
      config_id:
        type: integer
    type: object
  presenters.RoomResponse:
    properties:
      archived_at:
        type: string
      config_id:
        type: integer
      room_id:
        type: integer
      server_id:
        type: integer
      status:
        type: string
    type: object
  presenters.RoomUpdateRequest:
    properties:
      archived_at:
        type: string
      server_id:
        type: integer
    type: object
  presenters.RoomsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/presenters.RoomResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  presenters.TestResponse:
    properties:
      pong:
        type: string
    required:
    - pong
    type: object
  presenters.UserBalanceUpdateRequest:
    properties:
      delta:
        example: -250
        type: integer
    type: object
  presenters.UserCreateRequest:
    properties:
      balance:
        example: 5000
        type: integer
      nickname:
        example: ludobox_vip
        type: string
    type: object
  presenters.UserResponse:
    properties:
      balance:
        example: 1000
        type: integer
      nickname:
        example: user_42
        type: string
      user_id:
        example: 42
        type: integer
    type: object
  presenters.UserUpdateRequest:
    properties:
      nickname:
        example: ludobox_vip_2
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: LudaBox UserService
  title: LudaBox API
  version: "1.0"
paths:
  /admin/config:
    post:
      consumes:
      - application/json
      description: Creates a new room config.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.ConfigUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Create config
      tags:
      - Config
  /admin/config/{config_id}:
    delete:
      consumes:
      - application/json
      description: Archives an active config.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Archive config
      tags:
      - Config
    get:
      consumes:
      - application/json
      description: Returns a single room config by id.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Get config by id
      tags:
      - Config
    put:
      consumes:
      - application/json
      description: Archives the existing config and creates a new config revision.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Config id
        in: path
        name: config_id
        required: true
        type: integer
      - description: Config payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.ConfigUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Replace config by id
      tags:
      - Config
  /admin/configs/used:
    get:
      consumes:
      - application/json
      description: Returns non-archived configs with pagination, optional sorting
        and filtering.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Sort field
        in: query
        name: sort_field
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_direction
        type: string
      - collectionFormat: csv
        description: Comma-separated filter fields
        in: query
        items:
          type: string
        name: filter_fields
        type: array
      - collectionFormat: csv
        description: Comma-separated filter operators (eq, neq, gt, lt, gte, lte,
          in, not_in, contains, contained, overlap)
        in: query
        items:
          type: string
        name: filter_operators
        type: array
      - collectionFormat: csv
        description: Comma-separated filter values
        in: query
        items:
          type: string
        name: filter_values
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.ConfigsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: List active configs
      tags:
      - Config
  /admin/room:
    post:
      consumes:
      - application/json
      description: Creates a room and automatically assigns it to the least busy active
        game server.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Room create payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.RoomCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenters.RoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Create room by config
      tags:
      - Room
  /admin/room/{room_id}:
    delete:
      consumes:
      - application/json
      description: Archives a room by setting archived_at.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Room id
        in: path
        name: room_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Delete room by id
      tags:
      - Room
    get:
      consumes:
      - application/json
      description: Returns a single room by id.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Room id
        in: path
        name: room_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.RoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Get room by id
      tags:
      - Room
    put:
      consumes:
      - application/json
      description: Updates only archived_at or server_id.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Room id
        in: path
        name: room_id
        required: true
        type: integer
      - description: Room update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.RoomUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.RoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Update room by id
      tags:
      - Room
  /admin/rooms:
    get:
      consumes:
      - application/json
      description: Returns non-archived rooms.
      parameters:
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Sort field
        in: query
        name: sort_field
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_direction
        type: string
      - collectionFormat: csv
        description: Comma-separated filter fields
        in: query
        items:
          type: string
        name: filter_fields
        type: array
      - collectionFormat: csv
        description: Comma-separated filter operators (eq, neq, gt, lt, gte, lte,
          in, not_in, like, not_like)
        in: query
        items:
          type: string
        name: filter_operators
        type: array
      - collectionFormat: csv
        description: Comma-separated filter values
        in: query
        items:
          type: string
        name: filter_values
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.RoomsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Returns non-archived rooms
      tags:
      - Room
  /healthz:
    get:
      description: Lightweight liveness probe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Service health
      tags:
      - System
  /ping:
    get:
      consumes:
      - application/json
      description: ping pong
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.TestResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: ping pong
      tags:
      - Test
  /user:
    delete:
      consumes:
      - application/json
      description: Deletes the current user record from user_service.
      parameters:
      - description: Authenticated user id
        in: header
        name: X-Authenticated-User
        required: true
        type: string
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Delete current user
      tags:
      - User
    get:
      consumes:
      - application/json
      description: Returns the current user profile. If the user is absent in user_service,
        it is created automatically with nickname user_{id} and zero balance.
      parameters:
      - description: Authenticated user id
        in: header
        name: X-Authenticated-User
        required: true
        type: string
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Get current user
      tags:
      - User
    post:
      consumes:
      - application/json
      description: Creates the current user. If a request body is provided, nickname
        and initial balance are applied after creation.
      parameters:
      - description: Authenticated user id
        in: header
        name: X-Authenticated-User
        required: true
        type: string
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Optional create payload
        in: body
        name: request
        schema:
          $ref: '#/definitions/presenters.UserCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/presenters.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Create current user
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Updates the current user nickname.
      parameters:
      - description: Authenticated user id
        in: header
        name: X-Authenticated-User
        required: true
        type: string
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Nickname update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Update current user
      tags:
      - User
  /user/balance:
    put:
      consumes:
      - application/json
      description: Applies a relative delta to the current user balance. Use positive
        values to credit and negative values to debit.
      parameters:
      - description: Authenticated user id
        in: header
        name: X-Authenticated-User
        required: true
        type: string
      - description: Authorization Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Balance delta payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/presenters.UserBalanceUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/presenters.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/presenters.ErrorResponse'
      summary: Update current user balance
      tags:
      - User
swagger: "2.0"
